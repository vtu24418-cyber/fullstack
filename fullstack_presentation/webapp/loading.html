<!DOCTYPE html>
<html>
<head>
<title>Loading</title>
<style>
body {display:flex; justify-content:center; align-items:center; height:100vh; background:#222; color:white;}
.loader {border:8px solid #f3f3f3; border-top:8px solid #3498db; border-radius:50%; width:60px; height:60px; animation:spin 1s linear infinite;}
@keyframes spin {100% {transform: rotate(360deg);}}
</style>
</head>
<body>
<div>
<div class="loader"></div>
<p>Loading Inventory...</p>
</div>

<script>
setTimeout(()=>{ window.location.href='stock.html'; },2000);
</script>
</body>
</html>
